<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIRANG</title>
  <style>
    :root {
      --bg: #f3f3f3;
      --card: #ffffff;
      --line: #e4e6eb;
      --text: #111111;
      --muted: #72767f;
      --accent-red: #F11942;
      --button-bg: #eef1f7;
      --button-text: #2e3138;
      --spotify: #1db954;
      --apple: #fa4d67;
      --amazon: #34c6cf;
      --deezer: #8a4dff;
      --tidal: #0f0f10;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .album-art {
      display: block;
      width: min(100%, 240px);
      margin: 0 auto 20px;
      height: auto;
    }

    .title {
      margin: 0;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .card {
      background: var(--card);
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(17, 17, 17, 0.03);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 12px 16px 18px;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
    }

    .row:last-child {
      border-bottom: none;
    }

    .service {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .label.spotify {
      color: var(--spotify);
      font-size: 17px;
      font-weight: 800;
    }

    .label.apple,
    .label.amazon,
    .label.deezer,
    .label.tidal {
      color: #111;
    }

    .logo-box {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      display: grid;
      place-items: center;
    }

    .logo-box.apple,
    .logo-box.amazon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      color: #fff;
      font-weight: 800;
      flex-basis: 32px;
    }

    .logo-box.apple {
      background: var(--apple);
      font-size: 18px;
    }

    .logo-box.amazon {
      background: var(--amazon);
      color: #0f0f10;
      font-size: 10px;
      line-height: 0.9;
      text-transform: lowercase;
      font-weight: 700;
      text-align: center;
    }

    .btn {
      appearance: none;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 14px;
      font-weight: 700;
      padding: 14px 20px;
      border-radius: 4px;
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .row:hover .btn,
    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
      background: #e7ebf2;
    }

    .tidal-wordmark {
      letter-spacing: 0.36em;
      font-weight: 800;
    }

    @media (max-width: 440px) {
      .title {
        font-size: 28px;
      }

      .subtitle {
        font-size: 13px;
      }

      .row {
        padding: 16px 10px 16px 14px;
        gap: 12px;
      }

      .label {
        font-size: 15px;
      }

      .btn {
        padding: 13px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
